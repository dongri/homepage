<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kana Converter</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <nav class="nav">
      <a href="../index.html">Top</a>
      <a href="../links.html">Links</a>
      <a href="../kungfu.html">Kungfu</a>
      <a href="../projects.html">Projects</a>
      <a href="index.html" class="active">Tools</a>
    </nav>
    <h1>Kana Converter</h1>
    <div class="panel">
    <div>
      <label for="zenkaku">全角カナ</label>
      <textarea id="zenkaku" placeholder="トウキョウト　シブヤク（ひらがなでも可）" oninput="convertFromZenkaku()"></textarea>
    </div>
    <div>
      <label for="hankaku">半角カナ</label>
      <textarea id="hankaku" placeholder="ﾄｳｷｮｳﾄ ｼﾌﾞﾔｸ" oninput="convertFromHankaku()"></textarea>
    </div>

    <script>
      const kanaMap = {
        'ガ':'ｶﾞ','ギ':'ｷﾞ','グ':'ｸﾞ','ゲ':'ｹﾞ','ゴ':'ｺﾞ',
        'ザ':'ｻﾞ','ジ':'ｼﾞ','ズ':'ｽﾞ','ゼ':'ｾﾞ','ゾ':'ｿﾞ',
        'ダ':'ﾀﾞ','ヂ':'ﾁﾞ','ヅ':'ﾂﾞ','デ':'ﾃﾞ','ド':'ﾄﾞ',
        'バ':'ﾊﾞ','ビ':'ﾋﾞ','ブ':'ﾌﾞ','ベ':'ﾍﾞ','ボ':'ﾎﾞ',
        'パ':'ﾊﾟ','ピ':'ﾋﾟ','プ':'ﾌﾟ','ペ':'ﾍﾟ','ポ':'ﾎﾟ',
        'ヴ':'ｳﾞ',
        'ア':'ｱ','イ':'ｲ','ウ':'ｳ','エ':'ｴ','オ':'ｵ',
        'カ':'ｶ','キ':'ｷ','ク':'ｸ','ケ':'ｹ','コ':'ｺ',
        'サ':'ｻ','シ':'ｼ','ス':'ｽ','セ':'ｾ','ソ':'ｿ',
        'タ':'ﾀ','チ':'ﾁ','ツ':'ﾂ','テ':'ﾃ','ト':'ﾄ',
        'ナ':'ﾅ','ニ':'ﾆ','ヌ':'ﾇ','ネ':'ﾈ','ノ':'ﾉ',
        'ハ':'ﾊ','ヒ':'ﾋ','フ':'ﾌ','ヘ':'ﾍ','ホ':'ﾎ',
        'マ':'ﾏ','ミ':'ﾐ','ム':'ﾑ','メ':'ﾒ','モ':'ﾓ',
        'ヤ':'ﾔ','ユ':'ﾕ','ヨ':'ﾖ',
        'ラ':'ﾗ','リ':'ﾘ','ル':'ﾙ','レ':'ﾚ','ロ':'ﾛ',
        'ワ':'ﾜ','ヲ':'ｦ','ン':'ﾝ',
        'ァ':'ｧ','ィ':'ｨ','ゥ':'ｩ','ェ':'ｪ','ォ':'ｫ',
        'ッ':'ｯ','ャ':'ｬ','ュ':'ｭ','ョ':'ｮ',
        'ー':'ｰ','。':'｡','「':'｢','」':'｣','、':'､','・':'･','゛':'ﾞ','゜':'ﾟ',
        '　':' '
      };
      const h2z = {};
      for (const k in kanaMap) h2z[kanaMap[k]] = k;
      const h2zRe = new RegExp(Object.keys(h2z).sort((a, b) => b.length - a.length).join('|'), 'g');

      function hiraToKata(s) {
        return s.replace(/[ぁ-ゖ]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
      }

      function convertFromZenkaku() {
        const zen = document.getElementById('zenkaku').value;
        document.getElementById('hankaku').value =
          hiraToKata(zen).replace(/./g, c => kanaMap[c] || c);
      }

      function convertFromHankaku() {
        const han = document.getElementById('hankaku').value;
        document.getElementById('zenkaku').value = han.replace(h2zRe, m => h2z[m]);
      }
    </script>
    </div>
  </body>
</html>
