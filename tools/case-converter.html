<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case Converter</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <nav class="nav">
      <a href="../index.html">Top</a>
      <a href="../links.html">Links</a>
      <a href="../kungfu.html">Kungfu</a>
      <a href="../projects.html">Projects</a>
      <a href="index.html" class="active">Tools</a>
    </nav>
    <h1>Case Converter</h1>
    <div class="panel">
    <div>
      <label for="lowercase">Lowercase</label>
      <textarea id="lowercase" placeholder="lowercase" oninput="convertFromLowercase()"></textarea>
    </div>
    <div>
      <label for="uppercase">Uppercase</label>
      <textarea id="uppercase" placeholder="UPPERCASE" oninput="convertFromUppercase()"></textarea>
    </div>

    <script>
      function convertFromLowercase() {
        const lower = document.getElementById('lowercase');
        const upper = document.getElementById('uppercase');
        lower.value = lower.value.toLowerCase();
        upper.value = lower.value.toUpperCase();
      }

      function convertFromUppercase() {
        const lower = document.getElementById('lowercase');
        const upper = document.getElementById('uppercase');
        upper.value = upper.value.toUpperCase();
        lower.value = upper.value.toLowerCase();
      }
    </script>
    </div>
  </body>
</html>
